<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="Calculator.css">
</head>
<body>
    <div class="calculator-container">
        <input class="calculator-input" placeholder="0" readonly/>
        <button class="clear-button"> C </button>
        <button class="delete-button"> ← </button>
        <button class="op-button divide-button"> ÷ </button>
        <button class="number-button"> 7 </button>
        <button class="number-button"> 8 </button>
        <button class="number-button"> 9 </button>
        <button class="op-button multiply-button"> x </button>
        <button class="number-button"> 4 </button>
        <button class="number-button"> 5 </button>
        <button class="number-button"> 6 </button>
        <button class="op-button minus-button"> - </button>
        <button class="number-button"> 1 </button>
        <button class="number-button"> 2 </button>
        <button class="number-button"> 3 </button>
        <button class="op-button plus-button"> + </button>
        <button class="number-button zero-button"> 0 </button>
        <button class="op-button equal-to-button"> = </button>
    </div>

    <script src="./Calculator.js"></script>
</body>
</html>
