<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Masters</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css">

</head>
<body>
    <header>
        <img class="page-logo" src="coffee_masters_logo.png"/>
        <h2 class="page-title"> Coffee Masters </h2>

    </header>

    <div class="order-page">
        <div class="order-box">
            <h2 class="section-title"> ITEMS </h2>
            <ul class="order-list">
                <li class="order-item">
                    <div class="quantity"> 1x </div>
                    <div class="item"> 
                        <p class="item-name"> Cappuccino </p>
                        <span class="item-spec"> Milk </span>
                        <span class="item-spec"> Extra Foam </span>     
                    </div>
                    <div class="item-price"> R$ 5.00 </div>

                </li>
            </ul>

        </div>
        <div class="order-name">
            <h2 class="section-title"> NAME </h2>
            <div class="input-box">
                <label for="name"> Name for Order</label>
                <input type="text">
            </div>
        </div>
        <div class="order-payment">
            <h2 class="section-title"> PAYMENT </h2>
            <div class="input-box card-number">
                <label for="name"> CARD NUMBER </label>
                <input type="text">
            </div>
            <div class="input-box exp-date">
                <label for="name"> EXP. DATE </label>
                <input type="text">
            </div>
            <div class="input-box ccv-card">
                <label for="name"> CCV </label>
                <input type="text">
            </div>
        </div>
        <div class="order-total">
            <table class="total-table">
                <tr>
                    <td> Subtotal: </td>
                    <td class="table-price"> R$ 10.00</td>
                </tr>
                <tr>
                     <td> Tax: </td>
                    <td class="table-price"> R$ 0.00</td>
                </tr>
                <tr class="final-total">
                    <td> Total: </td>
                    <td class="table-price"> R$ 10.00</td>
                </tr>
            </table>
            <button> Place Order </button>
        </div>
    </div>
    
</body>
</html>
