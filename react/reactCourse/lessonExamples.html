<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Beginner's Guide To React</title>

        <script src="https://unpkg.com/react@16.12.0/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@16.12.0/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone@7.8.3/babel.js"></script>
        <script src="https://unpkg.com/vanilla-tilt@1.7.0/dist/vanilla-tilt.min.js"></script>

        <style>
            .tilt-root {
                height: 150px;
                background-color: red;
                width: 200px;
                background-image: -webkit-linear-gradient(
                    315deg,
                    #ff00ba 0%,
                    #fae713 100%
                );
                background-image: linear-gradient(
                    135deg,
                    #ff00ba 0%,
                    #fae713 100%
                );
                transform-style: preserve-3d;
                will-change: transform;
                transform: perspective(1000px) rotateX(0deg) rotateY(0deg)
                    scale3d(1, 1, 1);
            }
            .tilt-child {
                position: absolute;
                width: 50%;
                height: 50%;
                top: 50%;
                left: 50%;
                transform: translateZ(30px) translateX(-50%) translateY(-50%);
                box-shadow: 0 0 50px 0 rgba(51, 51, 51, 0.3);
                background-color: white;
            }
            .totally-centered {
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script type="text/babel">
            const state = { eventCount: 0, username: "" };

            function App() {
                function handleClick() {
                    setState({ eventCount: state.eventCount + 1 });
                }

                function handleChange(event) {
                    setState({ username: event.target.value });
                }

                return (
                    <div>
                        <p>There have been {state.eventCount} events.</p>
                        <p>
                            <button
                                onClick={() =>
                                    setState({
                                        eventCount: state.eventCount + 1,
                                    })
                                }
                            >
                                Click Me
                            </button>
                            <button onClick={handleClick}>Click Me</button>
                        </p>
                        <p>You typed: {state.username}</p>
                        <p>
                            <input
                                onBlur={(e) =>
                                    setState({ username: e.target.value })
                                }
                            />
                            <input onChange={handleChange} />
                        </p>
                    </div>
                );
            }

            function setState(newState) {
                Object.assign(state, newState);
                renderApp();
            }

            //Lesson 13
            function GreetingV1() {
                const [name, setName] = React.useState("");
                const handleChange = (event) => setName(event.target.value);

                return (
                    <div>
                        <h3>Lesson 13</h3>
                        <form>
                            <label htmlFor="name-v1">Name: </label>
                            <input
                                onChange={handleChange}
                                id="name-v1"
                            />
                        </form>
                        {name ? (
                            <strong>Hello {name}</strong>
                        ) : (
                            "Please type your name"
                        )}
                    </div>
                );
            }

            //Lesson 14
            function GreetingV2() {
                const [name, setName] = React.useState(
                    () => window.localStorage.getItem("name-v2") || "",
                );

                React.useEffect(() => {
                    window.localStorage.setItem("name-v2", name);
                }, [name]);

                return (
                    <div>
                        <h3> Lesson 14</h3>
                        <form>
                            <label htmlFor="name-v2">Name: </label>
                            <input
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                id="name-v2"
                            />
                        </form>
                        {name ? (
                            <strong>Hello {name}</strong>
                        ) : (
                            "Please type your name"
                        )}
                    </div>
                );
            }

            //Lesson 17
            function useLocalStorageState(key, defaultValue = "") {
                const [state, setState] = React.useState(
                    () => window.localStorage.getItem(key) || defaultValue,
                );

                React.useEffect(() => {
                    window.localStorage.setItem(key, state);
                }, [key, state]);

                return [state, setState];
            }

            function GreetingV3() {
                const [name, setName] = useLocalStorageState("name-v3", "");
                return (
                    <div>
                        <h3>Lesson 17</h3>
                        <form>
                            <label htmlFor="name-v3">Name: </label>
                            <input
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                id="name-v3"
                            />
                        </form>
                        {name ? (
                            <strong>Hello {name}</strong>
                        ) : (
                            "Please type your name"
                        )}
                    </div>
                );
            }

            // Lesson 18
            function Tilt({ children }) {
                const tiltRef = React.useRef();

                React.useEffect(() => {
                    const tiltNode = tiltRef.current;
                    console.log(tiltNode);
                    const vanillaTiltOptions = {
                        max: 25,
                        speed: 400,
                        glare: true,
                        "max-glare": 0.5,
                    };
                    VanillaTilt.init(tiltNode, vanillaTiltOptions);

                    return () => {
                        tiltNode.vanillaTilt.destroy();
                        console.log("vanilla tilt was destroyed");
                    };
                }, []);

                return (
                    <div
                        ref={tiltRef}
                        className="tilt-root"
                    >
                        <div className="tilt-child">{children}</div>
                    </div>
                );
            }

            function TiltApp() {
                const [showTilt, setShowTilt] = React.useState(true);
                return (
                    <div>
                        <h3>Lesson 18: Vanilla Tilt </h3>
                        <label>
                            <input
                                type="checkbox"
                                checked={showTilt}
                                onChange={(e) => setShowTilt(e.target.checked)}
                            />{" "}
                            show tilt
                        </label>
                        <div style={{ marginTop: "20px" }}>
                            {showTilt ? (
                                <Tilt>
                                    <div className="totally-centered">
                                        vanilla-tilt.js
                                    </div>
                                </Tilt>
                            ) : null}
                        </div>
                    </div>
                );
            }

            // Lesson 19
            function Child() {
                console.log(
                    "%c    Child: render start",
                    "color: MediumSpringGreen",
                );

                const [count, setCount] = React.useState(() => {
                    console.log(
                        "%c    Child: useState callback",
                        "color: tomato",
                    );
                    return 0;
                });

                React.useEffect(() => {
                    console.log(
                        "%c    Child: useEffect no deps",
                        "color: LightCoral",
                    );
                    return () => {
                        console.log(
                            "%c    Child: useEffect no deps cleanup",
                            "color: LightCoral",
                        );
                    };
                });

                React.useEffect(() => {
                    console.log(
                        "%c    Child: useEffect empty deps",
                        "color: MediumTurquoise",
                    );
                    return () => {
                        console.log(
                            "%c    Child: useEffect empty deps cleanup",
                            "color: MediumTurquoise",
                        );
                    };
                }, []);

                React.useEffect(() => {
                    console.log(
                        "%c    Child: useEffect with dep",
                        "color: HotPink",
                    );
                    return () => {
                        console.log(
                            "%c    Child: useEffect with dep cleanup",
                            "color: HotPink",
                        );
                    };
                }, [count]);

                const element = (
                    <button
                        onClick={() =>
                            setCount((previousCount) => previousCount + 1)
                        }
                    >
                        {count}
                    </button>
                );

                console.log(
                    "%c    Child: render end",
                    "color: MediumSpringGreen",
                );

                return element;
            }

            function App2() {
                console.log("%cApp: render start", "color: MediumSpringGreen");

                const [showChild, setShowChild] = React.useState(() => {
                    console.log("%cApp: useState callback", "color: tomato");
                    return false;
                });

                React.useEffect(() => {
                    console.log(
                        "%cApp: useEffect no deps",
                        "color: LightCoral",
                    );
                    return () => {
                        console.log(
                            "%cApp: useEffect no deps cleanup",
                            "color: LightCoral",
                        );
                    };
                });

                React.useEffect(() => {
                    console.log(
                        "%cApp: useEffect empty deps",
                        "color: MediumTurquoise",
                    );
                    return () => {
                        console.log(
                            "%cApp: useEffect empty deps cleanup",
                            "color: MediumTurquoise",
                        );
                    };
                }, []);

                React.useEffect(() => {
                    console.log("%cApp: useEffect with dep", "color: HotPink");
                    return () => {
                        console.log(
                            "%cApp: useEffect with dep cleanup",
                            "color: HotPink",
                        );
                    };
                }, [showChild]);

                const element = (
                    <>
                        {" "}
                        <h3> Lesson 19</h3>
                        <label>
                            <input
                                type="checkbox"
                                checked={showChild}
                                onChange={(e) => setShowChild(e.target.checked)}
                            />{" "}
                            show child
                        </label>
                        <div
                            style={{
                                padding: 10,
                                margin: 10,
                                height: 30,
                                width: 30,
                                border: "solid",
                            }}
                        >
                            {showChild ? <Child /> : null}
                        </div>
                    </>
                );

                console.log("%cApp: render end", "color: MediumSpringGreen");

                return element;
            }

            //Lesson 20
            function UsernameForm() {
                const usernameInput = React.useRef();
                function handleSubmit(event) {
                    event.preventDefault();
                    // const username = event.target.elements.usernameInput.value;
                    const username = usernameInput.current.value;
                    alert(`You entered ${username}`);
                }

                return (
                    <form onSubmit={handleSubmit}>
                        <h3> Lesson 20</h3>
                        <div>
                            <label htmlFor="usernameInput"> Username:</label>
                            <input
                                id="usernameInput"
                                type="text"
                                ref={usernameInput}
                            />
                        </div>
                        <button type="submit"> Submit </button>
                    </form>
                );
            }

            //Lesson 21
            function UsernameForm2() {
                const usernameInput = React.useRef();

                const [username, setUsername] = React.useState("");
                const isLowerCase = username === username.toLowerCase();
                const error = isLowerCase ? null : "Username must be lowercase";
                function handleSubmit(event) {
                    event.preventDefault();
                    // const username = event.target.elements.usernameInput.value;
                    const username = usernameInput.current.value;
                    alert(`You entered ${username}`);
                }

                function handleChange(event) {
                    setUsername(event.target.value);
                }

                return (
                    <form onSubmit={handleSubmit}>
                        <h3> Lesson 21</h3>
                        <div>
                            <label htmlFor="usernameInput"> Username:</label>
                            <input
                                id="usernameInput"
                                type="text"
                                ref={usernameInput}
                                onChange={handleChange}
                            />
                        </div>
                        <div style={{ color: "red" }}>{error}</div>
                        <button
                            disabled={Boolean(error)}
                            type="submit"
                        >
                            Submit
                        </button>
                    </form>
                );
            }

            //Lesson 22
            function UsernameForm3() {
                // const usernameInput = React.useRef();

                const [username, setUsername] = React.useState("");

                function handleSubmit(event) {
                    event.preventDefault();
                    // const username = usernameInput.current.value;
                    alert(`You entered ${username}`);
                }

                function handleChange(event) {
                    setUsername(event.target.value.toLowerCase());
                }

                return (
                    <form onSubmit={handleSubmit}>
                        <h3> Lesson 22</h3>
                        <div>
                            <label htmlFor="usernameInput"> Username:</label>
                            <input
                                id="usernameInput"
                                type="text"
                                /*ref={usernameInput}*/
                                onChange={handleChange}
                                value={username}
                            />
                        </div>
                        <button type="submit">Submit</button>
                    </form>
                );
            }

            // Lesson 23
            const ErrorBoundary = ReactErrorBoundary.ErrorBoundary
            function Bomb() {
                throw new Error(" 💥 KABOO00MMM! 💥");
            }

            function App3() {
                const [explode, setExplode] = React.useState(false);
                return (
                    <div>
                        <h3> Lesson 23 </h3>
                        <div>
                            <button onClick={() => setExplode(true)}>💣</button>
                        </div>
                        <div>
                            <ErrorBoundary> {explode ? <Bomb /> : "Push the button to the max!"} </ErrorBoundary>
                        </div>
                    </div>
                );
            }

            function Main() {
                return (
                    <div>
                        <h1>React Course Notes</h1>
                        <App />
                        <hr />
                        <GreetingV1 />
                        <hr />
                        <GreetingV2 />
                        <hr />
                        <GreetingV3 />
                        <hr />
                        <TiltApp />
                        <hr />
                        <App2 />
                        <hr />
                        <UsernameForm />
                        <hr />
                        <UsernameForm2 />
                        <hr />
                        <UsernameForm3 />
                        <hr />
                        <App3 />
                    </div>
                );
            }

            function renderApp() {
                ReactDOM.render(<Main />, document.getElementById("root"));
            }

            renderApp();
        </script>
    </body>
</html>
